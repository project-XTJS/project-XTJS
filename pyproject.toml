paddlepaddle = "^2.5.2"
paddleocr = "^2.7.0.3"
opencv-python = "^4.8.1.78"
python-dotenv = "^1.0.0"
celery = "^5.3.4"
redis = "^5.0.1"

[tool.poetry.dev-dependencies]
