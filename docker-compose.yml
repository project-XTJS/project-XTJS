version: '3.8'

services:
  # 主应用服务
  app:
    image: project-xtjs:release-fd92b4a
    container_name: project-xtjs
    ports:
      - "8080:8080"
    depends_on:
      - milvus
      - postgres
    networks:
      - app_network
    restart: always

  # Milvus 服务
  milvus:
    image: milvusdb/milvus:v2.3.0
    container_name: milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    environment:
      - MILVUS_LOG_LEVEL=info
    networks:
      - app_network
    restart: always

  # PostgreSQL 服务
  postgres:
    image: postgres:15
    container_name: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=xtjs_db
    networks:
      - app_network
    restart: always

  # Flyway 服务
  flyway:
    image: flyway/flyway:latest
    container_name: flyway
    volumes:
      - ./db/migration:/flyway/sql
    command: -url=jdbc:postgresql://postgres:5432/xtjs_db -user=admin -password=password migrate
    depends_on:
      - postgres
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  milvus_data:
  postgres_data: