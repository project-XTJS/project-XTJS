version: '3.8'

services:
  # 主应用服务
  app:
    image: project-xtjs:release-fd92b4a
    container_name: project-xtjs
    ports:
      - "8080:8080"
    depends_on:
      - milvus
      - postgres
      - minio
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://admin:password@postgres:5432/xtjs_db}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME:-tendering-files}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - PADDLE_OCR_DEVICE=${PADDLE_OCR_DEVICE:-cpu}
      - PADDLE_OCR_FALLBACK_TO_CPU=${PADDLE_OCR_FALLBACK_TO_CPU:-true}
      - PADDLE_OCR_DISABLE_MKLDNN=${PADDLE_OCR_DISABLE_MKLDNN:-true}
      - PADDLE_OCR_ENABLE_STRUCTURE=${PADDLE_OCR_ENABLE_STRUCTURE:-true}
      - PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK=${PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK:-true}
    networks:
      - app_network
    restart: always

  # Milvus 服务
  milvus:
    image: milvusdb/milvus:v2.3.0
    container_name: milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    environment:
      - MILVUS_LOG_LEVEL=info
    networks:
      - app_network
    restart: always

  # PostgreSQL 服务
  postgres:
    image: postgres:15
    container_name: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=xtjs_db
    networks:
      - app_network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d xtjs_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO 服务
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    networks:
      - app_network
    restart: always

  # Flyway 服务
  flyway:
    image: flyway/flyway:latest
    container_name: flyway
    volumes:
      - ./db/migration:/flyway/sql
    command: -url=jdbc:postgresql://postgres:5432/xtjs_db -user=admin -password=password migrate
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  milvus_data:
  postgres_data:
  minio_data:
