version: '3.8'

services:
  # 核心主程序 (FastAPI + PaddleOCR)
  web:
    build: .
    container_name: xtjs_web
    ports:
      - "8080:8080"
    volumes:
      # 把本地的一个目录挂载给 PaddleX
      - paddlex_cache:/root/.paddlex  
    environment:
      - MINIO_ENDPOINT=minio:9000  # 注意：在 Docker 网络里，直接用服务名 "minio" 替代 "127.0.0.1"
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET_NAME=xtjs-files
    depends_on:
      - minio
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia   # 强制要求 Docker 挂载宿主机的显卡
              count: all
              capabilities: [gpu]

  # MinIO 存储服务 (自动部署)
  minio:
    image: minio/minio:latest
    container_name: xtjs_minio
    ports:
      - "9000:9000"  # API 端口
      - "9001:9001"  # 控制台端口
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  paddlex_cache:
  minio_data: