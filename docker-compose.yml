services:
  # 主应用服务
  app:
    image: project-xtjs:release-d5cce65
    container_name: project-xtjs
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      redis:
        condition: service_healthy
      milvus:
        condition: service_started
      flyway:
        condition: service_completed_successfully
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://admin:password@postgres:5432/xtjs_db}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME:-update-file}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - MINIO_ALLOWED_EXTENSIONS=${MINIO_ALLOWED_EXTENSIONS:-pdf,docx,doc,png,jpg,jpeg,bmp,tif,tiff}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - PADDLE_OCR_DEVICE=${PADDLE_OCR_DEVICE:-gpu:0}
      - PADDLE_OCR_FALLBACK_TO_CPU=${PADDLE_OCR_FALLBACK_TO_CPU:-true}
      - PADDLE_OCR_DISABLE_MKLDNN=${PADDLE_OCR_DISABLE_MKLDNN:-true}
      - PADDLE_OCR_ENABLE_STRUCTURE=${PADDLE_OCR_ENABLE_STRUCTURE:-true}
      - PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK=${PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK:-true}
    volumes:
      - ocr_runtime:/app/.ocr_runtime
      - output_seals:/app/output_seals
    networks:
      - app_network
    restart: always

  # Milvus 服务
  milvus:
    image: milvusdb/milvus:v2.3.0
    container_name: milvus
    command: ["milvus", "run", "standalone"]
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    environment:
      - MILVUS_LOG_LEVEL=info
    networks:
      - app_network
    restart: always

  # PostgreSQL 服务
  postgres:
    image: postgres:15
    container_name: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=xtjs_db
    networks:
      - app_network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d xtjs_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # MinIO 服务
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    networks:
      - app_network
    restart: always

  # Redis 服务（Celery Broker/Backend）
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - app_network
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Flyway 服务
  flyway:
    image: flyway/flyway:latest
    container_name: flyway
    volumes:
      - ./db/migration:/flyway/sql
    command: -url=jdbc:postgresql://postgres:5432/xtjs_db -user=admin -password=password migrate
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network
    restart: "no"

networks:
  app_network:
    driver: bridge

volumes:
  milvus_data:
  postgres_data:
  minio_data:
  ocr_runtime:
  output_seals:
