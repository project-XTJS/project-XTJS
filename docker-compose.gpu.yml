services:
  app:
    # Requires Docker with NVIDIA Container Toolkit.
    gpus: ${OCR_GPU_DEVICES:-all}
    shm_size: "8gb"
    environment:
      - PADDLE_OCR_DEVICE=${OCR_GPU_DEVICE:-gpu:0}
      - PADDLE_OCR_DEVICE_POOL=${PADDLE_OCR_DEVICE_POOL:-auto}
      - PADDLE_OCR_MAX_INFLIGHT_PER_DEVICE=${PADDLE_OCR_MAX_INFLIGHT_PER_DEVICE:-1}
      - PADDLE_OCR_MULTI_GPU_LOG_SCHEDULING=${PADDLE_OCR_MULTI_GPU_LOG_SCHEDULING:-false}
      - PADDLE_OCR_FALLBACK_TO_CPU=${PADDLE_OCR_FALLBACK_TO_CPU:-true}
      - PADDLE_OCR_USE_DOC_ORIENTATION=${PADDLE_OCR_USE_DOC_ORIENTATION:-true}
      - PADDLE_OCR_USE_DOC_UNWARPING=${PADDLE_OCR_USE_DOC_UNWARPING:-true}
      - PADDLE_VL_PIPELINE_VERSION=${PADDLE_VL_PIPELINE_VERSION:-v1.5}
      - PADDLE_VL_USE_LAYOUT_DETECTION=${PADDLE_VL_USE_LAYOUT_DETECTION:-true}
      - PADDLE_VL_USE_CHART_RECOGNITION=${PADDLE_VL_USE_CHART_RECOGNITION:-false}
      - PADDLE_VL_USE_SEAL_RECOGNITION=${PADDLE_VL_USE_SEAL_RECOGNITION:-true}
      - PADDLE_VL_USE_OCR_FOR_IMAGE_BLOCK=${PADDLE_VL_USE_OCR_FOR_IMAGE_BLOCK:-true}
      - PADDLE_VL_FORMAT_BLOCK_CONTENT=${PADDLE_VL_FORMAT_BLOCK_CONTENT:-false}
      - PADDLE_VL_MERGE_LAYOUT_BLOCKS=${PADDLE_VL_MERGE_LAYOUT_BLOCKS:-false}
      - PADDLE_VL_USE_QUEUES=${PADDLE_VL_USE_QUEUES:-false}
      - PADDLE_VL_RESTRUCTURE_PAGES=${PADDLE_VL_RESTRUCTURE_PAGES:-true}
      - OCR_PROGRESS_ENABLED=${OCR_PROGRESS_ENABLED:-true}
      - OCR_PROGRESS_BAR_WIDTH=${OCR_PROGRESS_BAR_WIDTH:-24}
      - OCR_PROGRESS_KEEP_RECENT_UPDATES=${OCR_PROGRESS_KEEP_RECENT_UPDATES:-12}
      - OCR_PROGRESS_HEARTBEAT_SECONDS=${OCR_PROGRESS_HEARTBEAT_SECONDS:-10.0}
      - PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK=${PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK:-true}
      - OCR_STORAGE_ROOT=/app/.ocr_runtime
      - PADDLE_PDX_CACHE_HOME=/app/.ocr_runtime/paddlex-cache
      - OCR_RUNTIME_TEMP_DIR=/app/.ocr_runtime/runtime-tmp
